<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miqat</title>

    <link rel="stylesheet" href="/css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>

  <body>
    <div class="home_page">

      <!-- Sidebar -->

      <div class="side_bar">
        <div class="parent">
          <div class="first_list">
            <div>
              <img
                src="./assets/images/Miqat_logo.png"
                class="miqat_logo"
                alt="Logo"
              />
            </div>

            <div>
              Mīqāt <br />
              Prayer & Focus.
            </div>
          </div>
          <hr>
          <div class="sec_list">
            <div class="sidebar_elements"><i class="ti ti-home"></i> Home</div>
            <div class="sidebar_elements"><i class="ti ti-clock-hour-3"></i> Salāh times</div>
            <div class="sidebar_elements"><i class="ti ti-vocabulary"></i> Qur'ān</div>
            <div class="sidebar_elements"><i class="ti ti-circle-dashed-number-3"></i> Tasbeeh counter</div>
            <div class="sidebar_elements"><i class="ti ti-compass"></i> Adhkār and duās</div>
            <div class="sidebar_elements"><i class="ti ti-compass"></i> Qibla compass</div>
            <div class="sidebar_elements"><i class="ti ti-focus-2"></i> Focus</div>
            <div class="sidebar_elements"><i class="ti ti-sun"></i> Theme settings</div>
            <div class="sidebar_elements"><i class="ti ti-circle-dotted-letter-g"></i> Goals</div>
            <div class="sidebar_elements"><i class="ti ti-info-octagon"></i> About Mīqāt</div>
            <div class="sidebar_elements"><i class="ti ti-calendar"></i> Calendar</div>
          </div>
          <hr>
          <div class="btn_close">Close</div>
        </div>
      </div>

      <!-- Header -->

      <header class="header">
        <button class="menu_btn">
          <i class="ti ti-menu-2"></i>
        </button>

        <div class="location">
          <img
            src="./assets/images/location_pin_002-removebg-preview.png"
            alt="Location"
            class="loc_icon"
          />

          <span>Ibadan</span>
        </div>

        <button class="icon_btn">
          <i class="ti ti-bell"></i>
        </button>
      </header>

      <!-- Main -->

      <main>
        <div class="dome-container">
          <img class="dome-outline" src="./assets/images/domeeee.png" alt="" />
        </div>

        <div class="prayer_card">
          <div class="sun_icon">
            <i class="ti ti-sun"></i>
          </div>

          <p class="greetings">Assalāmu alaykum</p>

          <h1 class="current_time">
            07:42<span class="time_suffix">AM</span>
          </h1>

          <p class="greg_date">Saturday, 17 May 2024</p>
          <p class="hijri_date">9 Dhul-Qadah 1445 AH</p>

          <p class="next_text">Next Prayer</p>

          <h2 class="next_salah">Ishā</h2>

          <div class="time_button">08:15 PM</div>
        </div>
      </main>

      <!-- Bottom Navigation -->

      <footer>
        <nav class="bottom_nav">
          <a href="index.html" class="nav_item active">
            <i class="ti ti-home"></i>
            <span>Home</span>
          </a>

          <a href="salah.html" class="nav_item">
            <i class="ti ti-clock-hour-4"></i>
            <span>Salāh</span>
          </a>

          <a href="#" class="nav_item">
            <i class="ti ti-circle-dot"></i>
            <span>Tasbeeh</span>
          </a>

          <a href="#" class="nav_item">
            <i class="ti ti-compass"></i>
            <span>Compass</span>
          </a>

          <a href="#" class="nav_item">
            <i class="ti ti-user"></i>
            <span>Profile</span>
          </a>
        </nav>
      </footer>

    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
